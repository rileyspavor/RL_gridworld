[experiment]
name = "ppo_frontier_survival"
seed = 11
notes = "Alternative PPO setup that punishes deaths, stalling, and loops more aggressively."

[environment]
id = "sneaky_enemies"
map_suite = "core_generalization"
render_mode = ""
activate_game_status = false

[observation]
name = "frontier_features"

[reward]
name = "survival_coverage"

[reward.params]
step_penalty = -0.02
new_cell_reward = 1.1
coverage_progress_weight = 2.0
invalid_move_penalty = -0.2
stay_penalty = -0.12
revisit_penalty = -0.05
loop_penalty = -0.05
observed_cell_penalty = -0.3
success_bonus = 17.5
death_penalty = -10.0
timeout_penalty = -2.0
coverage_ratio_bonus = 0.25

[algorithm]
name = "PPO"
policy = "MlpPolicy"

[algorithm.kwargs]
learning_rate = 0.00025
n_steps = 2048
batch_size = 256
gamma = 0.997
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.008
vf_coef = 0.5

[training]
total_timesteps = 450000
n_envs = 8
eval_freq = 25000
eval_episodes = 16
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 24
deterministic = true
