[experiment]
name = "ppo_frontier_dense_sneaky_timing_finetune"
output_root = "runs/sneaky_push"
seed = 7
notes = "Fine-tune the current best frontier PPO on sneaky_enemies only with timing-aware reward shaping and reduced wait punishment."

[environment]
id = "sneaky_enemies"
map_suite = ""
render_mode = ""
activate_game_status = false

[observation]
name = "frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.01
new_cell_reward = 1.15
coverage_progress_weight = 3.5
invalid_move_penalty = -0.1
stay_penalty = -0.01
forced_wait_bonus = 0.02
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.02
loop_penalty = -0.01
observed_cell_penalty = -0.05
unsafe_after_rotation_penalty = -2.5
future_danger_penalty = -0.2
trap_penalty = -0.15
trap_safe_action_threshold = 0
success_bonus = 20.0
death_penalty = -6.0
timeout_penalty = -1.0

[algorithm]
name = "PPO"
policy = "MlpPolicy"
init_model_path = "runs/finetune/20260325-195113-ppo_frontier_dense_hard_finetune/best_model.zip"

[algorithm.kwargs]
learning_rate = 0.0001
n_steps = 1024
batch_size = 256
gamma = 0.997
gae_lambda = 0.97
clip_range = 0.15
ent_coef = 0.005
vf_coef = 0.5

[training]
total_timesteps = 200000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true
reset_num_timesteps = false

[evaluation]
episodes = 48
deterministic = true
