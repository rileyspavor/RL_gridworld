[experiment]
name = "ppo_layered_dense"
seed = 13
notes = "Structured grid channels keep global spatial information while remaining MLP-friendly."

[environment]
id = "sneaky_enemies"
map_suite = "core_generalization"
render_mode = ""
activate_game_status = false

[observation]
name = "layered_grid"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.02
new_cell_reward = 1.0
coverage_progress_weight = 2.5
invalid_move_penalty = -0.15
stay_penalty = -0.08
revisit_penalty = -0.05
loop_penalty = -0.03
observed_cell_penalty = -0.1
success_bonus = 15.0
death_penalty = -7.5
timeout_penalty = -1.5

[algorithm]
name = "PPO"
policy = "MlpPolicy"

[algorithm.kwargs]
learning_rate = 0.0003
n_steps = 2048
batch_size = 256
gamma = 0.995
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.01
vf_coef = 0.5

[training]
total_timesteps = 450000
n_envs = 8
eval_freq = 25000
eval_episodes = 16
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 24
deterministic = true
