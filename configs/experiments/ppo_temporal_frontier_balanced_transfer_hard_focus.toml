[experiment]
name = "ppo_temporal_frontier_balanced_transfer_hard_focus"
output_root = "runs/tournament_balance"
seed = 31
notes = "Balanced frontier best-model transfer into temporal frontier features, then train on a hard-focused tournament suite to lift chokepoint and sneaky without dropping the easy maps outright."

[environment]
id = "sneaky_enemies"
map_suite = "tournament_hard_focus"
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.015
new_cell_reward = 1.15
coverage_progress_weight = 3.4
invalid_move_penalty = -0.1
stay_penalty = -0.03
forced_wait_bonus = 0.02
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.025
loop_penalty = -0.01
observed_cell_penalty = -0.04
unsafe_after_rotation_penalty = -1.2
future_danger_penalty = -0.04
trap_penalty = -0.04
trap_safe_action_threshold = 0
success_bonus = 18.0
death_penalty = -6.5
timeout_penalty = -1.5

[algorithm]
name = "PPO"
policy = "MlpPolicy"
transfer_model_path = "runs/finetune/20260325-195113-ppo_frontier_dense_hard_finetune/best_model.zip"
transfer_observation_prefix = 54

[algorithm.kwargs]
learning_rate = 0.00015
n_steps = 1024
batch_size = 256
gamma = 0.998
gae_lambda = 0.97
clip_range = 0.15
ent_coef = 0.004
vf_coef = 0.5

[algorithm.kwargs.policy_kwargs]
net_arch = [256, 256]

[training]
total_timesteps = 350000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 64
deterministic = true
