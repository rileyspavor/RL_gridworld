[experiment]
name = "ppo_temporal_frontier_winner_transfer_lowlr_hard_emphasis"
output_root = "runs/tournament_balance"
seed = 149
notes = "Fresh-optimizer low-LR transfer from the current balanced winner onto the hard-emphasis tournament suite to push sneaky/chokepoint while keeping some easy-map repetition in the mix."

[environment]
id = "sneaky_enemies"
map_suite = "tournament_hard_emphasis"
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.015
new_cell_reward = 1.15
coverage_progress_weight = 3.5
invalid_move_penalty = -0.1
stay_penalty = -0.025
forced_wait_bonus = 0.015
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.015
loop_penalty = -0.005
observed_cell_penalty = -0.02
unsafe_after_rotation_penalty = -1.15
future_danger_penalty = -0.04
trap_penalty = -0.04
trap_safe_action_threshold = 0
success_bonus = 19.0
death_penalty = -6.0
timeout_penalty = -1.0

[algorithm]
name = "PPO"
policy = "MlpPolicy"
transfer_model_path = "runs/tournament_balance/exp_safe_polish_from_balanced_winner/best_model.zip"
transfer_observation_prefix = 122

[algorithm.kwargs]
learning_rate = 0.00005
n_steps = 1024
batch_size = 256
gamma = 0.997
gae_lambda = 0.97
clip_range = 0.12
ent_coef = 0.0025
vf_coef = 0.5

[training]
total_timesteps = 80000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 64
deterministic = true
