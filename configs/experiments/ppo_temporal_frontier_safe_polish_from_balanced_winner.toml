[experiment]
name = "ppo_temporal_frontier_safe_polish_from_balanced_winner"
output_root = "runs/tournament_balance"
seed = 43
notes = "Short polish pass from the best balanced temporal checkpoint, oversampling safe/maze to recover easy-map performance while keeping both hard maps in rotation."

[environment]
id = "sneaky_enemies"
map_suite = "tournament_safe_polish"
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.015
new_cell_reward = 1.15
coverage_progress_weight = 3.5
invalid_move_penalty = -0.1
stay_penalty = -0.025
forced_wait_bonus = 0.015
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.015
loop_penalty = -0.005
observed_cell_penalty = -0.02
unsafe_after_rotation_penalty = -1.15
future_danger_penalty = -0.04
trap_penalty = -0.04
trap_safe_action_threshold = 0
success_bonus = 19.0
death_penalty = -6.0
timeout_penalty = -1.0

[algorithm]
name = "PPO"
policy = "MlpPolicy"
init_model_path = "runs/tournament_balance/exp_specialist_all_standard_recovery/best_model.zip"

[training]
total_timesteps = 120000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true
reset_num_timesteps = false

[evaluation]
episodes = 64
deterministic = true
