[experiment]
name = "frontier_features_dense_coverage"
seed = 7
output_root = "runs/matrix"
notes = "Matrix run: frontier feature observation with dense coverage reward."

[environment]
id = "sneaky_enemies"
map_suite = "all_standard"
render_mode = ""
activate_game_status = false

[observation]
name = "frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.02
new_cell_reward = 1.2
coverage_ratio_weight = 0.2
no_progress_penalty = -0.04
success_bonus = 14.0
speed_bonus_weight = 2.0
death_penalty = -8.0
timeout_penalty = -1.5

[algorithm]
name = "PPO"
policy = "MlpPolicy"

[algorithm.kwargs]
learning_rate = 0.0003
n_steps = 1024
batch_size = 256
gamma = 0.995
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.01
vf_coef = 0.5

[training]
total_timesteps = 300000
n_envs = 4
eval_points = 100
eval_spacing = "log"
eval_episodes = 10
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 20
deterministic = true
