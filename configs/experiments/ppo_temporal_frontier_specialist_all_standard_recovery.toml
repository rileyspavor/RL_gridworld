[experiment]
name = "ppo_temporal_frontier_specialist_all_standard_recovery"
output_root = "runs/tournament_balance"
seed = 41
notes = "Recover easy-map performance from the sneaky-specialized temporal policy by fine-tuning on the full tournament map set, using the specialist as a hard-map prior rather than starting over."

[environment]
id = "sneaky_enemies"
map_suite = "all_standard"
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.02
new_cell_reward = 1.15
coverage_progress_weight = 3.5
invalid_move_penalty = -0.1
stay_penalty = -0.03
forced_wait_bonus = 0.02
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.02
loop_penalty = -0.01
observed_cell_penalty = -0.04
unsafe_after_rotation_penalty = -1.3
future_danger_penalty = -0.05
trap_penalty = -0.05
trap_safe_action_threshold = 0
success_bonus = 18.0
death_penalty = -6.0
timeout_penalty = -1.5

[algorithm]
name = "PPO"
policy = "MlpPolicy"
init_model_path = "runs/sneaky_push/20260325-232427-ppo_temporal_frontier_sneaky_enemytransfer/best_model.zip"

[training]
total_timesteps = 300000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true
reset_num_timesteps = false

[evaluation]
episodes = 64
deterministic = true
