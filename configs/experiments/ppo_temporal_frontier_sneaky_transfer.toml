[experiment]
name = "ppo_temporal_frontier_sneaky_transfer"
output_root = "runs/sneaky_push"
seed = 13
notes = "Warm-start temporal frontier PPO from the existing 54-dim frontier policy, copying shared weights and training on sneaky_enemies only."

[environment]
id = "sneaky_enemies"
map_suite = ""
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.02
new_cell_reward = 1.15
coverage_progress_weight = 3.5
invalid_move_penalty = -0.1
stay_penalty = -0.02
forced_wait_bonus = 0.03
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.02
loop_penalty = -0.01
observed_cell_penalty = -0.05
unsafe_after_rotation_penalty = -1.5
future_danger_penalty = -0.05
trap_penalty = -0.05
trap_safe_action_threshold = 0
success_bonus = 20.0
death_penalty = -6.0
timeout_penalty = -2.0

[algorithm]
name = "PPO"
policy = "MlpPolicy"
transfer_model_path = "runs/finetune/20260325-195113-ppo_frontier_dense_hard_finetune/best_model.zip"
transfer_observation_prefix = 54

[algorithm.kwargs]
learning_rate = 0.00015
n_steps = 1024
batch_size = 256
gamma = 0.998
gae_lambda = 0.97
clip_range = 0.15
ent_coef = 0.005
vf_coef = 0.5

[training]
total_timesteps = 250000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 64
deterministic = true
