[experiment]
name = "ppo_temporal_frontier_sneaky"
output_root = "runs/sneaky_push"
seed = 11
notes = "Train from scratch on sneaky_enemies with temporal frontier features and timing-aware reward shaping."

[environment]
id = "sneaky_enemies"
map_suite = ""
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.01
new_cell_reward = 1.2
coverage_progress_weight = 4.0
invalid_move_penalty = -0.1
stay_penalty = -0.005
forced_wait_bonus = 0.03
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.015
loop_penalty = -0.005
observed_cell_penalty = -0.05
unsafe_after_rotation_penalty = -2.5
future_danger_penalty = -0.15
trap_penalty = -0.1
trap_safe_action_threshold = 0
success_bonus = 20.0
death_penalty = -6.0
timeout_penalty = -1.0

[algorithm]
name = "PPO"
policy = "MlpPolicy"

[algorithm.kwargs]
learning_rate = 0.0002
n_steps = 2048
batch_size = 512
gamma = 0.999
gae_lambda = 0.97
clip_range = 0.15
ent_coef = 0.02
vf_coef = 0.5

[algorithm.kwargs.policy_kwargs]
net_arch = [256, 256]

[training]
total_timesteps = 300000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 48
deterministic = true
