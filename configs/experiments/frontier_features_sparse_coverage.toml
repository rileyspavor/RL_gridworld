[experiment]
name = "frontier_features_sparse_coverage"
seed = 7
output_root = "runs/matrix"
notes = "Matrix run: frontier feature observation with sparse coverage reward."

[environment]
id = "sneaky_enemies"
map_suite = "all_standard"
render_mode = ""
activate_game_status = false

[observation]
name = "frontier_features"

[reward]
name = "sparse_coverage"

[reward.params]
step_penalty = -0.01
new_cell_reward = 1.0
success_bonus = 10.0
death_penalty = -6.0
timeout_penalty = -1.0

[algorithm]
name = "PPO"
policy = "MlpPolicy"

[algorithm.kwargs]
learning_rate = 0.0003
n_steps = 1024
batch_size = 256
gamma = 0.995
gae_lambda = 0.95
clip_range = 0.2
ent_coef = 0.01
vf_coef = 0.5

[training]
total_timesteps = 300000
n_envs = 4
eval_points = 100
eval_spacing = "log"
eval_episodes = 10
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 20
deterministic = true
