[experiment]
name = "ppo_temporal_frontier_winner_transfer_wait_hard_emphasis"
output_root = "runs/tournament_balance"
seed = 151
notes = "Fresh-optimizer hard-emphasis continuation from the balanced winner with slightly stronger waiting and temporal danger shaping to trade a bit of aggression for better hard-map survivability and coverage."

[environment]
id = "sneaky_enemies"
map_suite = "tournament_hard_emphasis"
render_mode = ""
activate_game_status = false

[observation]
name = "temporal_frontier_features"

[reward]
name = "dense_coverage"

[reward.params]
step_penalty = -0.015
new_cell_reward = 1.15
coverage_progress_weight = 3.45
invalid_move_penalty = -0.1
stay_penalty = -0.02
forced_wait_bonus = 0.025
forced_wait_safe_action_threshold = 1
revisit_penalty = -0.015
loop_penalty = -0.005
observed_cell_penalty = -0.018
unsafe_after_rotation_penalty = -1.25
future_danger_penalty = -0.055
trap_penalty = -0.055
trap_safe_action_threshold = 0
success_bonus = 19.0
death_penalty = -6.25
timeout_penalty = -0.9

[algorithm]
name = "PPO"
policy = "MlpPolicy"
transfer_model_path = "runs/tournament_balance/exp_safe_polish_from_balanced_winner/best_model.zip"
transfer_observation_prefix = 122

[algorithm.kwargs]
learning_rate = 0.00004
n_steps = 1024
batch_size = 256
gamma = 0.997
gae_lambda = 0.97
clip_range = 0.12
ent_coef = 0.002
vf_coef = 0.5

[training]
total_timesteps = 80000
n_envs = 8
eval_freq = 10000
eval_episodes = 24
deterministic_eval = true
save_best_model = true

[evaluation]
episodes = 64
deterministic = true
